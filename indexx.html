<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badminton Queue & Matchmaker - Queue Dropdown</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Itim&family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0F172A;
            --card-color: #1E293B; 
            --primary-color: #10B981; 
            --primary-hover: #059669;
            --accent-orange: #F59E0B; 
            --dark-text: #E2E8F0; 
            --muted-text: #94A3B8; 
            --light-gray: #334155; 
            --danger-color: #EF4444;
            --danger-hover: #DC2626;
            --playing-bg: #064E3B;
            --team-a-color: #3B82F6; 
            --team-a-bg: #EFF6FF; 
            --team-b-color: #F59E0B; 
            --team-b-bg: #FFFBEB; 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Kanit', sans-serif;
            color: var(--dark-text);
        }

        button, input, select, .player-item {
            touch-action: manipulation;
        }

        body {
            background-color: var(--bg-color);
            padding: 15px;
            display: flex;
            justify-content: center;
            background-image: radial-gradient(#10B981 0.5px, transparent 0.5px), radial-gradient(#10B981 0.5px, #0F172A 0.5px);
            background-size: 24px 24px;
            background-position: 0 0, 12px 12px;
        }

        .app-container {
            display: grid;
            grid-template-columns: 320px 1fr 320px;
            gap: 15px;
            max-width: 1600px;
            width: 100%;
        }

        @media (max-width: 1024px) {
            .app-container { grid-template-columns: 1fr; }
        }

        .box {
            background: var(--card-color);
            border-radius: 16px;
            padding: 15px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            border: 1px solid var(--light-gray);
        }

        h2 {
            font-family: 'Itim', cursive;
            font-size: 1.25rem;
            margin-bottom: 12px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: var(--primary-color);
        }

        .left-col, .right-col {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .form-group { margin-bottom: 8px; }

        input[type="text"], select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--light-gray);
            border-radius: 8px;
            outline: none;
            background: #0F172A;
            font-size: 0.9rem;
            color: var(--dark-text);
        }

        input[type="text"]:focus, select:focus { border-color: var(--primary-color); background: #1E293B; }

        .court-control-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #0F172A;
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 0.9rem;
            border: 1px solid var(--light-gray);
        }

        .court-btn-group { display: flex; gap: 6px; }
        .btn-ctrl { background: var(--light-gray); color: var(--dark-text); }
        .btn-ctrl:hover { background: var(--muted-text); }

        button {
            width: 100%;
            padding: 10px; 
            border: none;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary { background-color: var(--primary-color); color: #0F172A; font-weight: bold; margin-bottom: 4px; }
        .btn-primary:hover { background-color: var(--primary-hover); }
        .btn-dark { background-color: #334155; color: white; border: 1px solid #475569; }
        .btn-dark:hover { background-color: #475569; }
        
        .btn-danger-court { background-color: var(--danger-color); color: white; font-weight: bold; margin-bottom: 4px; }
        .btn-danger-court:hover { background-color: var(--danger-hover); }

        .player-list-box { max-height: 380px; }
        .player-list-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; padding-bottom: 5px; width: 100%; }

        .player-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #111827;
            padding: 5px 6px; 
            border-radius: 8px;
            border: 1px solid var(--light-gray);
            cursor: grab;
            user-select: none;
            font-size: 0.8rem;
            overflow: hidden;
        }
        .player-item.is-resting { opacity: 0.3; background: #1E293B; cursor: not-allowed; }

        .player-info { display: flex; align-items: center; gap: 4px; flex-grow: 1; overflow: hidden; }
        .toggle-checkbox { width: 14px; height: 14px; cursor: pointer; accent-color: var(--primary-color); flex-shrink: 0; }
        .player-no { font-weight: 600; color: var(--primary-color); min-width: 12px; font-size: 0.75rem; text-align: center; }
        .player-name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-grow: 1; min-width: 0; }

        .player-tag { font-size: 0.6rem; padding: 1px 3px; border-radius: 4px; font-weight: 600; color: #FFF; display: inline-block; flex-shrink: 0; }
        .tag-L3 { background: #DC2626; } 
        .tag-L2 { background: #D97706; } 
        .tag-L1 { background: #2563EB; } 

        .game-counter { font-size: 0.7rem; color: var(--accent-orange); font-weight: 500; flex-shrink: 0; }
        .btn-delete-member { background: none; border: none; color: #64748B; cursor: pointer; font-size: 1rem; width: 14px; text-align: center; }
        .btn-delete-member:hover { color: var(--danger-color); }

        .courts-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; align-content: start; }
        @media (max-width: 768px) { .courts-grid { grid-template-columns: 1fr; } }
        
        .court-card {
            background: #FFFFFF;
            border-radius: 16px;
            padding: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            border: 2px solid #E2E8F0;
        }
        .court-card.drag-over { border-color: var(--primary-color); background: #F0FDF4; }

        .court-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; border-bottom: 1px dashed #CBD5E1; padding-bottom: 6px; gap: 8px; }
        
        .court-title-input {
            font-family: 'Itim', cursive;
            font-size: 1.15rem;
            color: #0F172A;
            font-weight: bold;
            background: #F1F5F9;
            border: 1px solid #CBD5E1;
            border-radius: 6px;
            padding: 2px 6px;
            width: 110px;
            outline: none;
            text-align: center;
        }
        .court-title-input:focus { background: #FFFFFF; border-color: var(--primary-color); box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2); }

        .court-status { font-size: 0.8rem; font-weight: 600; padding: 2px 8px; border-radius: 12px; background: #64748B; color: #FFF; flex-shrink: 0; }
        .court-status.playing { background: var(--playing-bg); color: #A7F3D0; border: 1px solid var(--primary-color); }

        .court-players { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 8px; }
        
        .court-player-slot {
            background: #F8FAFC;
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            border: 1px dashed #94A3B8;
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 42px;
            position: relative;
            overflow: hidden;
            color: #64748B !important;
        }

        .court-player-slot.filled { border-style: solid; }
        .court-player-slot.filled .court-pname { color: #1E293B; font-weight: 600; }
        .court-player-slot.filled .team-label { font-weight: bold; font-size: 0.9rem; }

        .court-player-name-wrapper { display: flex; align-items: center; gap: 4px; flex-grow: 1; overflow: hidden; white-space: nowrap; min-width: 0; }
        .court-pname { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-grow: 1; min-width: 0; cursor: help; }

        .btn-kick { 
            background: #FFFFFF;
            border: none; 
            color: #F87171; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 1.1rem; 
            padding: 0 6px; 
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            display: none;
            align-items: center;
            box-shadow: -5px 0 10px rgba(0,0,0,0.1);
        }
        .court-player-slot:hover .btn-kick { display: flex; }
        .btn-kick:hover { color: var(--danger-color); background: #FEF2F2; }

        .court-main-btns { display: flex; gap: 6px; margin-bottom: 4px; }

        .court-actions { display: flex; gap: 5px; margin-top: 6px; padding-top: 6px; border-top: 1px dashed #CBD5E1; }
        .btn-fill-court { background: #3B82F6; color: white; font-weight: bold; padding: 8px; font-size: 0.85rem; border-radius: 6px; width: 100%; }
        .btn-fill-court:hover { background: #2563EB; }

        .court-select-player { width: 100%; height: 100%; border: none; background: transparent; font-size: 0.8rem; color: #94A3B8 !important; outline: none; cursor: pointer; text-align: center; text-align-last: center; }
        .court-select-player option { background: #FFFFFF; color: #0F172A; }

        .stats-box { height: 340px; }
        .stats-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .stats-table th { text-align: left; padding: 6px 4px; border-bottom: 2px solid var(--light-gray); color: var(--primary-color); }
        .stats-table td { padding: 6px 4px; border-bottom: 1px solid #334155; }
        .stats-count { text-align: center; font-weight: bold; color: #FFFFFF; }

        .queue-box { flex-grow: 1; max-height: 300px; }
        .queue-item { background: #111827; border: 1px solid var(--light-gray); border-radius: 8px; padding: 6px; margin-bottom: 6px; font-size: 0.8rem; }
        
        .queue-item-header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .queue-item-header { color: var(--accent-orange); font-size: 0.75rem; font-weight: bold; }
        
        .select-queue-move {
            width: 120px;
            padding: 3px 6px;
            font-size: 0.75rem;
            border-radius: 6px;
            background: #0F172A;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            outline: none;
            cursor: pointer;
        }
        .select-queue-move option { background: #1E293B; color: var(--dark-text); }

        .queue-players-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
        .queue-p-box { background: #1E293B; padding: 3px 5px; border-radius: 4px; display: flex; align-items: center; justify-content: space-between; overflow: hidden; }
        .queue-pname { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-grow: 1; min-width: 0; }

        .scroll-area { overflow-y: auto; flex-grow: 1; margin-top: 5px; padding-right: 3px; overflow-x: hidden; } 
        .scroll-area::-webkit-scrollbar { width: 4px; }
        .scroll-area::-webkit-scrollbar-thumb { background: var(--light-gray); border-radius: 10px; }

        /* Custom Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.85); 
            backdrop-filter: blur(4px); 
            display: flex; justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0; pointer-events: none;
            transition: all 0.25s ease-in-out;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: var(--card-color);
            border: 2px solid var(--primary-color);
            border-radius: 16px;
            padding: 24px;
            width: 90%; max-width: 420px;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5);
            transform: scale(0.92) translateY(10px); 
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .modal-overlay.active .modal-content { transform: scale(1) translateY(0); }
        .modal-text { font-size: 1.05rem; line-height: 1.6; margin-bottom: 20px; color: var(--dark-text); text-align: left; }
        .modal-btns { display: flex; gap: 10px; }
        .modal-btn-confirm { background: var(--primary-color); color: #0F172A; font-weight: bold; width: 100%; }
        .modal-btn-confirm:hover { background: var(--primary-hover); }
        .modal-btn-cancel { background: #475569; color: white; width: 100%; }
        .modal-btn-cancel:hover { background: #64748B; }

        /* 🚨 ปุ่มไอคอนไฟฉุกเฉิน */
        .emergency-icon-btn {
            font-size: 1.35rem;
            cursor: pointer;
            user-select: none;
            filter: grayscale(100%) opacity(40%);
            transition: all 0.2s ease-in-out;
            padding: 2px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .emergency-icon-btn:hover { filter: grayscale(40%) opacity(80%); }
        .emergency-icon-btn.active {
            filter: grayscale(0%) opacity(100%);
            animation: pulse-emergency 1.2s infinite;
        }
        @keyframes pulse-emergency {
            0% { transform: scale(1); filter: drop-shadow(0 0 2px #EF4444) grayscale(0%); }
            50% { transform: scale(1.15); filter: drop-shadow(0 0 10px #EF4444) grayscale(0%); }
            100% { transform: scale(1); filter: drop-shadow(0 0 2px #EF4444) grayscale(0%); }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="left-col">
            <div class="box">
                <h2>🏸 Badminton Matchmaker (Test)</h2>
                
                <div class="court-control-container">
                     <span>จำนวนสนามแบด</span>
                    <div class="court-btn-group">
                        <button style="width:28px; height:28px; padding:0;" class="btn-ctrl" id="btnMinusCourt">-</button>
                        <button style="width:28px; height:28px; padding:0;" class="btn-ctrl" id="btnPlusCourt">+</button>
                    </div>
                </div>

                <div class="form-group">
                    <input type="text" id="playerName" placeholder="พิมพ์ชื่อผู้เล่นใหม่...">
                </div>

                 <div class="form-group">
                    <select id="playerLevel">
                        <option value="L1">L1 (🐣 มือใหม่)</option>
                        <option value="L2">L2 (🐦ทั่วไป)</option>
                        <option value="L3">L3 (🐴 นักวิ่ง)</option>
                    </select>
                </div>
                <button class="btn-primary" id="btnAddPlayer" style="margin-bottom: 12px;">☑️ เพิ่มผู้เล่น </button>
                
                 <hr style="border: 0; border-top: 1px dashed var(--light-gray); margin-bottom: 12px;">

                <button class="btn-primary" id="btnAutoMatch" style="background-color: var(--accent-orange); margin-bottom: 6px;">🎲 กดเพื่อสุ่มทีม (Random Team)</button>
                <button class="btn-dark" id="btnClearAll">🧹 Clear Queue</button>
            </div>

            <div class="box player-list-box">
                <h2>🤹‍♀️ Player List (<span id="playerCount">0</span>)</h2>
                 <div class="scroll-area">
                    <div class="player-list-grid" id="playerList"></div>
                </div>
            </div>
        </div>

        <div class="courts-grid" id="courtsGrid"></div>

        <div class="right-col">
             <div class="box queue-box">
                <h2>⏳ คิวรอเกมถัดไป</h2>
                <div class="scroll-area" id="waitingQueue"></div>
            </div>

            <div class="box stats-box">
                <h2>📊 สรุปจำนวนเกมวันนี้</h2>
                 <div class="scroll-area">
                    <table class="stats-table">
                        <thead>
                             <tr><th>ชื่อ</th><th>ระดับ</th><th style="text-align:center;">เกม</th></tr>
                        </thead>
                        <tbody id="statsTableBody"></tbody>
                    </table>
                </div>
           </div>
        </div>
    </div>

    <div class="modal-overlay" id="customModal">
         <div class="modal-content">
            <div class="modal-text" id="modalMessage">ข้อความแจ้งเตือน...</div>
            <div class="modal-btns">
                <button class="modal-btn-confirm" id="modalBtnConfirm">ตกลง</button>
                <button class="modal-btn-cancel" id="modalBtnCancel">ยกเลิก</button>
            </div>
        </div>
    </div>

    <script>
         let masterPlayers = [
            { id: 1, name: 'น้าดำ', level: 'L3', playedGames: 0, isAvailable: true },
            { id: 2, name: 'อาออฟ', level: 'L3', playedGames: 0, isAvailable: true },
            { id: 3, name: 'อาท', level: 'L2', playedGames: 0, isAvailable: true },
            { id: 4, name: 'มิว', level: 'L1', playedGames: 0, isAvailable: true },
            { id: 5, name: 'นิ้ง', level: 'L1', playedGames: 0, isAvailable: true },
            { id: 6, name: 'มาย', level: 'L2', playedGames: 0, isAvailable: true },
            { id: 7, name: 'มิกซ์', level: 'L2', playedGames: 0, isAvailable: true },
            { id: 8, name: 'เมย์', level: 'L1', playedGames: 0, isAvailable: true },
            { id: 9, name: 'อาโย', level: 'L2', playedGames: 0, isAvailable: true },
            { id: 10, name: 'เดียร์', level: 'L2', playedGames: 0, isAvailable: true },
            { id: 11, name: 'นะ', level: 'L2', playedGames: 0, isAvailable: true },
            { id: 12, name: 'ก้อง', level: 'L2', playedGames: 0, isAvailable: true },
            { id: 13, name: 'บอม', level: 'L2', playedGames: 0, isAvailable: true },
            { id: 14, name: 'แบม', level: 'L2', playedGames: 0, isAvailable: true }
        ];
        const levelPoints = { 'L3': 3, 'L2': 2, 'L1': 1 };
        let courtCount = 2;
        let activeMatches = { 1: [null, null, null, null], 2: [null, null, null, null] };
        let courtNames = { 1: "คอร์ด 1", 2: "คอร์ด 2" };
        let waitingQueue = [];
        let allowRandomFill = { 1: true, 2: true };
        let emergencyMode = { 1: false, 2: false };
        let modalCallback = null;

        function openCustomModal(message, confirmText, cancelText, callback) {
            document.getElementById('modalMessage').innerHTML = message;
            document.getElementById('modalBtnConfirm').innerText = confirmText;
            
            const cancelBtn = document.getElementById('modalBtnCancel');
            if (cancelText) {
                cancelBtn.innerText = cancelText;
                cancelBtn.style.display = 'inline-block';
            } else {
                cancelBtn.style.display = 'none';
            }
            
            document.getElementById('customModal').classList.add('active');
            modalCallback = callback;
        }

        function closeCustomModal(result) {
            document.getElementById('customModal').classList.remove('active');
            if (modalCallback) {
                modalCallback(result);
                modalCallback = null;
            }
        }

        document.getElementById('modalBtnConfirm').addEventListener('click', () => closeCustomModal(true));
        document.getElementById('modalBtnCancel').addEventListener('click', () => closeCustomModal(false));

        function getBusyInCourtIds() {
            let busyIds = [];
            Object.values(activeMatches).forEach(slotArr => {
                if(slotArr) slotArr.forEach(p => { if(p) busyIds.push(p.id); });
            });
            return busyIds;
        }

        function getAllBusyIds() {
            let busyIds = getBusyInCourtIds();
            waitingQueue.forEach(team => { team.forEach(p => { if(p) busyIds.push(p.id); }); });
            return busyIds;
        }

        function renderPlayers() {
            const playerListContainer = document.getElementById('playerList');
            playerListContainer.innerHTML = '';
            
            const allBusyIds = getAllBusyIds();
            const availablePlayers = masterPlayers.filter(p => !allBusyIds.includes(p.id));
            document.getElementById('playerCount').innerText = availablePlayers.filter(p => p.isAvailable).length;
            availablePlayers.forEach((player, index) => {
                const item = document.createElement('div');
                item.className = `player-item ${!player.isAvailable ? 'is-resting' : ''}`;
                
                if (player.isAvailable) {
                    item.setAttribute('draggable', 'true');
                    item.addEventListener('dragstart', (e) => {
                        e.dataTransfer.setData('text/plain', player.id);
                    });
                }

                item.innerHTML = `
                    <div class="player-info" title="${player.name}">
                        <input type="checkbox" class="toggle-checkbox" ${player.isAvailable ? 'checked' : ''} onchange="togglePlayerStatus(${player.id})">
                        <span class="player-no">${index + 1}</span>
                        <span class="player-name">${player.name}</span>
                        <span class="player-tag tag-${player.level}">${player.level}</span>
                        <span class="game-counter">[${player.playedGames}]</span>
                    </div>
                    <button class="btn-delete-member" onclick="deletePlayer(${player.id})">×</button>
                `;
                playerListContainer.appendChild(item);
            });
            renderStats();
            renderWaitingQueueHTML();
        }

        function togglePlayerStatus(id) {
            let player = masterPlayers.find(p => p.id === id);
            if (player) { 
                player.isAvailable = !player.isAvailable;
                renderPlayers(); 
                renderCourts();
            }
        }

        function renderStats() {
            const statsTableBody = document.getElementById('statsTableBody');
            statsTableBody.innerHTML = '';
            let sortedPlayers = [...masterPlayers].sort((a, b) => b.playedGames - a.playedGames);
            sortedPlayers.forEach(player => {
                const row = document.createElement('tr');
                row.innerHTML = `<td>${player.name}</td><td><span class="player-tag tag-${player.level}">${player.level}</span></td><td class="stats-count" style="color: #FFFFFF;">${player.playedGames} เกม</td>`;
                statsTableBody.appendChild(row);
            });
        }

        function renderWaitingQueueHTML() {
            const queueContainer = document.getElementById('waitingQueue');
            queueContainer.innerHTML = '';
            if(waitingQueue.length === 0) {
                queueContainer.innerHTML = '<div style="color:var(--muted-text); text-align:center; padding-top:20px; font-size:0.85rem;">ยังไม่มีคิวที่สุ่มไว้ </div>';
                return;
            }

            const activeCourtKeys = Object.keys(activeMatches).map(Number).sort((a,b)=>a-b);
            let emptyCourts = [];
            for (let i of activeCourtKeys) {
                if (activeMatches[i] && activeMatches[i].every(p => p === null)) {
                    emptyCourts.push({ num: i, name: courtNames[i] || `คอร์ด ${i}` });
                }
            }

            waitingQueue.forEach((team, index) => {
                const qItem = document.createElement('div');
                qItem.className = 'queue-item';
                
                let selectHTML = '';
                if (emptyCourts.length > 0) {
                    selectHTML = `<select class="select-queue-move" onchange="moveQueueToSpecificCourt(${index}, this)">
                                    <option value="" disabled selected>⚡️ ส่งลงสนามว่าง</option>`;
                
                    emptyCourts.forEach(c => {
                        selectHTML += `<option value="${c.num}">ลง ${c.name}</option>`;
                    });
                    selectHTML += `</select>`;
                }

                qItem.innerHTML = `
                    <div class="queue-item-header-container">
                        <div class="queue-item-header">MATCH คิวที่ ${index + 1}</div>
                        ${selectHTML}
                    </div>
                    <div class="queue-players-grid">
                        <div class="queue-p-box" style="border-left: 3px solid var(--team-a-color);" title="${team[0] ? team[0].name : ''}"><span class="queue-pname" style="color:var(--dark-text);"><span style="color:var(--team-a-color); font-weight:bold;">A</span> ${team[0] ? team[0].name : 'ว่าง'}</span> <span class="player-tag tag-${team[0] ? team[0].level : 'L1'}">${team[0] ? team[0].level : ''}</span></div>
                        <div class="queue-p-box" style="border-left: 3px solid var(--team-a-color);" title="${team[1] ? team[1].name : ''}"><span class="queue-pname" style="color:var(--dark-text);"><span style="color:var(--team-a-color); font-weight:bold;">A</span> ${team[1] ? team[1].name : 'ว่าง'}</span> <span class="player-tag tag-${team[1] ? team[1].level : 'L1'}">${team[1] ? team[1].level : ''}</span></div>
                        <div class="queue-p-box" style="border-left: 3px solid var(--team-b-color);" title="${team[2] ? team[2].name : ''}"><span class="queue-pname" style="color:var(--dark-text);"><span style="color:var(--team-b-color); font-weight:bold;">B</span> ${team[2] ? team[2].name : 'ว่าง'}</span> <span class="player-tag tag-${team[2] ? team[2].level : 'L1'}">${team[2] ? team[2].level : ''}</span></div>
                        <div class="queue-p-box" style="border-left: 3px solid var(--team-b-color);" title="${team[3] ? team[3].name : ''}"><span class="queue-pname" style="color:var(--dark-text);"><span style="color:var(--team-b-color); font-weight:bold;">B</span> ${team[3] ? team[3].name : 'ว่าง'}</span> <span class="player-tag tag-${team[3] ? team[3].level : 'L1'}">${team[3] ? team[3].level : ''}</span></div>
                    </div>
                `;
                queueContainer.appendChild(qItem);
            });
        }

        function moveQueueToSpecificCourt(queueIdx, selectElement) {
             const targetCourtNum = parseInt(selectElement.value);
            if (!targetCourtNum) return;
            if (!activeMatches[targetCourtNum] || !activeMatches[targetCourtNum].every(p => p === null)) {
                openCustomModal('⚠️ มีคนลงสนามนี้ตัดหน้าไปก่อนแล้วครับคุณพี่', 'ตกลง', '', null);
                renderWaitingQueueHTML();
                return;
             }
            const teamToMove = waitingQueue.splice(queueIdx, 1)[0];
            activeMatches[targetCourtNum] = teamToMove;
            allowRandomFill[targetCourtNum] = false;
            emergencyMode[targetCourtNum] = false;
            renderCourts();
            renderPlayers();
        }

         function getReadyPlayersPoolOnly() {
            const busyIds = getAllBusyIds();
            let pool = masterPlayers.filter(p => !busyIds.includes(p.id) && p.isAvailable);
            pool.sort((a, b) => {
                if (a.playedGames !== b.playedGames) return a.playedGames - b.playedGames;
                return 0.5 - Math.random();
            });
            return pool;
        }

        function updateCourtName(courtNum, value) {
            courtNames[courtNum] = value;
            renderWaitingQueueHTML();
        }

        function toggleEmergency(courtNum) {
            if (emergencyMode[courtNum] === undefined) emergencyMode[courtNum] = false;
            emergencyMode[courtNum] = !emergencyMode[courtNum];
            renderCourts();
        }

        function renderCourts() {
            const courtsGridContainer = document.getElementById('courtsGrid');
            courtsGridContainer.innerHTML = '';
            
            const allBusyIds = getAllBusyIds();
            const availablePlayersForSelect = masterPlayers.filter(p => !allBusyIds.includes(p.id) && p.isAvailable);

            const activeCourtKeys = Object.keys(activeMatches).map(Number).sort((a,b)=>a-b);
            activeCourtKeys.forEach(i => {
                if (!activeMatches[i]) activeMatches[i] = [null, null, null, null];
                if (!courtNames[i]) courtNames[i] = `คอร์ด ${i}`;
                if (emergencyMode[i] === undefined) emergencyMode[i] = false;

                const slots = activeMatches[i];
                 const hasPlayers = slots.some(p => p !== null);
                const isFull = slots.every(p => p !== null);
                const statusText = isFull ? 'กำลังเล่น' : (hasPlayers ? 'คนไม่ครบ' : 'สนามว่าง');
                const statusClass = isFull ? 'court-status playing' : 'court-status';

                 const courtCard = document.createElement('div');
                courtCard.className = 'court-card';
                courtCard.addEventListener('dragover', (e) => e.preventDefault());
                courtCard.addEventListener('dragenter', () => courtCard.classList.add('drag-over'));
                courtCard.addEventListener('dragleave', () => courtCard.classList.remove('drag-over'));
                courtCard.addEventListener('drop', (e) => {
                    courtCard.classList.remove('drag-over');
                    const playerId = parseInt(e.dataTransfer.getData('text/plain'));
                    fillPlayerToCourtManualSlot(i, playerId);
                });
                let slotsHTML = '';
                for (let s = 0; s < 4; s++) {
                    const p = slots[s];
                    const sideLabel = s < 2 ? '🅰️' : '🅱️';
                    const sideColor = s < 2 ? 'var(--team-a-color)' : 'var(--team-b-color)';
                    const sideBg = s < 2 ? 'var(--team-a-bg)' : 'var(--team-b-bg)';
                    const sideStyle = `border-left: 4px solid ${sideColor}; background-color: ${sideBg};`;
                    if (p) {
                        slotsHTML += `
                            <div class="court-player-slot filled" style="${sideStyle}">
                                <div class="court-player-name-wrapper" title="${p.name}">
                                     <span class="team-label" style="color:${sideColor}; flex-shrink:0;">${sideLabel} </span>
                                    <span class="court-pname">${p.name}</span>
                                    <span class="player-tag tag-${p.level}">${p.level}</span>
                                </div>
                                <button class="btn-kick" onclick="kickPlayer(${i}, ${s})">×</button>
                             </div>`;
                    } else {
                        let optionsHTML = '<option value="" disabled selected>ว่าง (แตะเลือกผู้เล่น)</option>';
                        availablePlayersForSelect.forEach(ap => {
                            optionsHTML += `<option value="${ap.id}">${ap.name} (${ap.level}) [${ap.playedGames}]</option>`;
                        });
                        slotsHTML += `
                            <div class="court-player-slot" style="background-color: #F8FAFC; border: 1px dashed #CBD5E1; color:#94A3B8 !important; justify-content:center; font-size:0.8rem; padding: 0;">
                                <select class="court-select-player" onchange="selectPlayerToSlot(${i}, ${s}, this)">
                                    ${optionsHTML}
                                </select>
                            </div>`;
                    }
                }

                const emergencyIconClass = emergencyMode[i] ? 'emergency-icon-btn active' : 'emergency-icon-btn';

                courtCard.innerHTML = `
                    <div class="court-header">
                        <input type="text" class="court-title-input" value="${courtNames[i]}" oninput="updateCourtName(${i}, this.value)" placeholder="เลขคอร์ด...">
                        <div class="${emergencyIconClass}" onclick="toggleEmergency(${i})" title="เปิด/ปิด โหมดสุ่มเปลี่ยนตัวฉุกเฉิน">🚨</div>
                     </div>
                    <div style="display:flex; justify-content: flex-end; margin-bottom: 6px;">
                        <span class="${statusClass}">${statusText}</span>
                    </div>
                    <div class="court-players">${slotsHTML}</div>
                     <div class="court-main-btns">
                        <button class="btn-primary" style="padding:8px; font-size:0.85rem; width: 50%;" onclick="finishMatch(${i})">จบเกม</button>
                        <button class="btn-danger-court" style="padding:8px; font-size:0.85rem; width: 50%;" onclick="closeCourt(${i})">ปิดคอร์ด</button>
                    </div>
                    <div class="court-actions">
                        <button class="btn-fill-court" onclick="randomFillCourt(${i})">🎲 สุ่มคนเข้าสนาม (เติมให้เต็ม)</button>
                    </div>
                 `;
                courtsGridContainer.appendChild(courtCard);
            });
        }

        document.getElementById('btnAutoMatch').addEventListener('click', () => {
            let pool = getReadyPlayersPoolOnly();
            if (pool.length < 4) {
                openCustomModal('... รอคนในสนามจบเกมเพื่อรวมสุ่มทีมใหม่ก่อนน้าาา', 'โอเค', '', null);
                return;
            }
             let selectedPool = pool.slice(0, 4);
            let bestDiff = Infinity;
            let finalTeam = [];
            const combos = [
                { t: [selectedPool[0], selectedPool[1], selectedPool[2], selectedPool[3]] },
                { t: [selectedPool[0], selectedPool[2], selectedPool[1], selectedPool[3]] },
                { t: [selectedPool[0], selectedPool[3], selectedPool[1], selectedPool[2]] }
            ];
            combos.forEach(c => {
                let ptsA = levelPoints[c.t[0].level] + levelPoints[c.t[1].level];
                let ptsB = levelPoints[c.t[2].level] + levelPoints[c.t[3].level];
                 let diff = Math.abs(ptsA - ptsB);
                if (diff < bestDiff) {
                    bestDiff = diff;
                    finalTeam = [c.t[0], c.t[1], c.t[2], c.t[3]];
                }
            });

            // === [🚨 เพิ่มเงื่อนไขใหม่ตามที่สั่ง: หากมีคิวรออยู่ก่อนแล้ว ให้เอาทีมที่สุ่มได้ใหม่ไปรอต่อท้ายคิวทันที 🚨] ===
            if (waitingQueue.length > 0) {
                waitingQueue.push(finalTeam);
                renderCourts();
                renderPlayers();
                return;
            }
            // ======================================================================================

            let emptyCourtNum = null;
            const activeCourtKeys = Object.keys(activeMatches).map(Number).sort((a,b)=>a-b);
            for (let i of activeCourtKeys) {
                if (activeMatches[i].every(p => p === null)) {
                    emptyCourtNum = i;
                    break;
                }
            }
            if (emptyCourtNum) {
                activeMatches[emptyCourtNum] = finalTeam;
                allowRandomFill[emptyCourtNum] = false;
                emergencyMode[emptyCourtNum] = false;
            } else {
                waitingQueue.push(finalTeam);
            }
            renderCourts();
            renderPlayers();
        });

        function selectPlayerToSlot(courtNum, slotIdx, selectElement) {
            const playerId = parseInt(selectElement.value);
            if (!playerId) return;
            let player = masterPlayers.find(p => p.id === playerId);
            if (player) {
                waitingQueue = waitingQueue.map(team => team.filter(p => p.id !== playerId)).filter(team => team.length > 0);
                activeMatches[courtNum][slotIdx] = player;
                if (activeMatches[courtNum].every(p => p !== null)) {
                    allowRandomFill[courtNum] = false;
                }
                renderCourts();
                renderPlayers();
            }
        }

        function fillPlayerToCourtManualSlot(courtNum, playerId) {
            let player = masterPlayers.find(p => p.id === playerId);
            if(!player) return;
            
            let currentSlots = activeMatches[courtNum];
            let firstEmptyIdx = currentSlots.findIndex(p => p === null);
            if (firstEmptyIdx !== -1) {
                waitingQueue = waitingQueue.map(team => team.filter(p => p.id !== playerId)).filter(team => team.length > 0);
                activeMatches[courtNum][firstEmptyIdx] = player;
                if (activeMatches[courtNum].every(p => p !== null)) {
                    allowRandomFill[courtNum] = false;
                }
                renderCourts();
                renderPlayers();
            }
        }

        function kickPlayer(courtNum, slotIdx) {
            const playerToKick = activeMatches[courtNum][slotIdx];
            if (!playerToKick) return;

            if (emergencyMode[courtNum]) {
                const busyIds = getAllBusyIds();
                let availablePool = masterPlayers.filter(p => !busyIds.includes(p.id) && p.isAvailable);

                if (availablePool.length > 0) {
                    const randomIndex = Math.floor(Math.random() * availablePool.length);
                    const newPlayer = availablePool[randomIndex];

                    activeMatches[courtNum][slotIdx] = newPlayer;
                    
                    openCustomModal(`🚨 นำ <b>${playerToKick.name}</b> ออกฉุกเฉินแล้วครับ (ไม่นับเกม)<br>ระบบสุ่มได้ <b>${newPlayer.name}</b> เข้ามาลงเล่นแทนช่องเดิมทันที`, 'ตกลง', '', () => {
                        renderCourts();
                        renderPlayers();
                    });
                } else {
                    openCustomModal('⚠️ 不 ไม่สามารถสุ่มผู้เล่นใหม่ได้ เนื่องจากไม่มีผู้เล่นที่ติ๊กถูก Ready ว่างเหลืออยู่ในระบบเลยครับ', 'ตกลง', '', null);
                }
            } else {
                openCustomModal('⚠️ ไม่สามารถนำผู้เล่นออกกลางคันได้ครับ!<br><span style="font-size:0.85rem; color:var(--muted-text);">หากเล่นเสร็จแล้วกรุณากดปุ่ม <b>"จบเกม"</b> เพื่อบันทึกเกม หรือหากต้องการเปลี่ยนตัวเนื่องจากอุบัติเหตุ/เหตุฉุกเฉิน ให้กดเปิดปุ่มไซเรน 🚨 มุมขวาบนของสนามให้เป็นสีแดงก่อนครับ</span>', 'รับทราบ', '', null);
            }
        }

        function randomFillCourt(courtNum) {
            if (!emergencyMode[courtNum]) {
                openCustomModal('⚠️ ไม่สามารถกดสุ่มเติมคนในโหมดปกติได้!<br><span style="font-size:0.85rem; color:var(--muted-text);">หากมีผู้เล่นบาดเจ็บต้องการเปลี่ยนตัวด่วน ให้เปิดปุ่มไซเรน 🚨 มุมขวาบนของสนามให้เป็นสีแดงก่อน แล้วกดปุ่ม (×) ที่ชื่อคนเจ็บ ระบบจะสุ่มดึงคนใหม่มาเสียบแทนให้ครับ</span>', 'ตกลง', '', null);
                return;
            }

            let slots = activeMatches[courtNum];
            let emptyIndices = [];
            slots.forEach((p, idx) => { if (p === null) emptyIndices.push(idx); });
            if (emptyIndices.length === 0) {
                openCustomModal('สนามนี้เต็มแล้วครับ หากต้องการเปลี่ยนตัวด่วน ให้กดกากบาท (×) เพื่อเตะคนที่ต้องการเปลี่ยนออกก่อน (ขณะที่เปิดไฟไซเรน 🚨 อยู่)', 'รับทราบ', '', null);
                return;
            }
            
            let busyIds = getAllBusyIds();
            let availablePool = masterPlayers.filter(p => !busyIds.includes(p.id) && p.isAvailable);
            
            if (availablePool.length < emptyIndices.length) {
                openCustomModal(`⚠️ คนว่างไม่พอเติมให้เต็มคอร์ดครับ (ต้องการ ${emptyIndices.length} คน แต่คนว่างที่พร้อมเล่นมีแค่ ${availablePool.length} คน)`, 'ตกลง', '', null);
                return;
            }
            
            availablePool.sort((a, b) => {
                if (a.playedGames !== b.playedGames) return a.playedGames - b.playedGames;
                return 0.5 - Math.random();
            });
            emptyIndices.forEach((emptyIdx, i) => {
                slots[emptyIdx] = availablePool[i];
            });
            if (slots.every(p => p !== null)) {
                allowRandomFill[courtNum] = false;
                emergencyMode[courtNum] = false;
            }
            
            renderCourts();
            renderPlayers();
        }

        function finishMatch(courtNum) {
            let slots = activeMatches[courtNum];
            if (!slots || slots.some(p => p === null)) {
                openCustomModal('⚠️ ผู้เล่นในสนามไม่ครบ 4 คน บันทึกจบเกมไม่ได้ครับคุณพี่', 'ตกลง', '', null);
                return;
            }
            slots.forEach(p => { if (p) p.playedGames++; });
            for (let s = 0; s < 4; s++) { slots[s] = null;
            }
            allowRandomFill[courtNum] = true;
            emergencyMode[courtNum] = false;
            if (waitingQueue.length > 0) {
                let nextTeam = waitingQueue.shift();
                activeMatches[courtNum] = nextTeam;
                allowRandomFill[courtNum] = false;
            }
            renderCourts();
            renderPlayers();
        }

        function closeCourt(courtNum) {
            let slots = activeMatches[courtNum];
            let hasPlayers = slots ? slots.some(p => p !== null) : false;
            function executeDeleteCourt(targetNum) {
                delete activeMatches[targetNum];
                delete courtNames[targetNum]; 
                delete allowRandomFill[targetNum];
                delete emergencyMode[targetNum];
                courtCount = Object.keys(activeMatches).length; 
            }

            if (!hasPlayers) {
                executeDeleteCourt(courtNum);
                renderCourts();
                renderPlayers();
                return;
            }

            openCustomModal(
                `⚠️ ต้องการปิดสนาม ${courtNames[courtNum] || `คอร์ด ${courtNum}`} <br><br>
                1. <b>"จบเกมแล้ว"</b> : ไปนั่งพัก ดื่มน้ำปัสสาวะก่อนค่าาา <br>
                2. <b>"ยังไม่จบเกม"</b> : ผู้เล่นนี้จะกลับไปต่อคิวเป็น <b>"คิวที่ 1 รอเล่นต่อ"</b> `,
                 'จบเกมแล้ว',
                'ยังไม่จบเกม',
                (isConfirm) => {
                    if (isConfirm) {
                        slots.forEach(p => { 
                            if (p) {
                                let mp = masterPlayers.find(m => m.id === p.id);
                                 if (mp) mp.playedGames++;
                            }
                        });
                     } else {
                        let currentTeam = [...slots];
                        waitingQueue.unshift(currentTeam); 
                    }
                    
                    executeDeleteCourt(courtNum);
                    renderCourts();
                    renderPlayers();
                }
            );
        }

        document.getElementById('btnAddPlayer').addEventListener('click', () => {
            const nameInput = document.getElementById('playerName');
            const levelSelect = document.getElementById('playerLevel');
            const name = nameInput.value.trim();
            if (!name) { openCustomModal('กรุณาใส่ชื่อก่อนเพิ่มผู้เล่น ', 'ตกลง', '', null); return; }
            const isExist = masterPlayers.some(p => p.name.toLowerCase() === name.toLowerCase());
            if (isExist) { openCustomModal('⚠️ มีชื่อนี้แล้ว กรุณาตั้งชื่อใหม่', 'ตกลง', '', null); return; }
            let maxId = masterPlayers.reduce((max, p) => p.id > max ? p.id : max, 0);
            masterPlayers.push({ id: maxId + 1, name: name, level: levelSelect.value, playedGames: 0, isAvailable: true });
            nameInput.value = '';
             renderPlayers();
            renderCourts();
        });
        function deletePlayer(id) {
            let busyIds = getBusyInCourtIds();
            if (busyIds.includes(id)) { openCustomModal('⚠️ ผู้เล่นกำลังแข่งอยู่บนสนาม ไม่สามารถลบออกจากระบบถาวรได้ครับ', 'ตกลง', '', null); return;
            }
            openCustomModal(
                `🔥 คุณต้องการลบผู้เล่นคนนี้ออกจากระบบถาวรใช่หรือไม่?`,
                'ใช่, ลบเลย', 'ยกเลิก',
                (confirmed) => {
                    if (confirmed) {
                         waitingQueue = waitingQueue.map(team => team.filter(p => p.id !== id)).filter(team => team.length > 0);
                        masterPlayers = masterPlayers.filter(p => p.id !== id);
                        renderPlayers();
                         renderCourts();
                    }
                }
            );
        }

        document.getElementById('btnPlusCourt').addEventListener('click', () => {
            const existingKeys = Object.keys(activeMatches).map(Number);
            const nextCourtNum = existingKeys.length > 0 ? Math.max(...existingKeys) + 1 : 1;
            
            activeMatches[nextCourtNum] = [null, null, null, null];
            courtNames[nextCourtNum] = `คอร์ด ${nextCourtNum}`;
             allowRandomFill[nextCourtNum] = true;
            emergencyMode[nextCourtNum] = false;
            courtCount = Object.keys(activeMatches).length;
            renderCourts();
            renderPlayers();
        });
        document.getElementById('btnMinusCourt').addEventListener('click', () => {
            const existingKeys = Object.keys(activeMatches).map(Number).sort((a,b)=>a-b);
            if (existingKeys.length > 1) {
                const lastCourtNum = existingKeys[existingKeys.length - 1];
                let slots = activeMatches[lastCourtNum];
                let hasPlayers = slots ? slots.some(p => p !== null) : false;
                
                if (hasPlayers) {
                    openCustomModal(
                        `⚠️ ${courtNames[lastCourtNum]} มีคนเล่นอยู่ ต้องการลบคอร์ดนี้จริงไหม?<br><span style="font-size:0.85rem; color:var(--danger-color);">ผู้เล่นในสนามนี้จะหายไปจากสนามทันที</span>`,
                         'ใช่, ลบเลย', 'ยกเลิก',
                        (confirm) => {
                            if(confirm) {
                                delete activeMatches[lastCourtNum];
                                 delete courtNames[lastCourtNum]; 
                                delete allowRandomFill[lastCourtNum];
                                delete emergencyMode[lastCourtNum];
                                courtCount = Object.keys(activeMatches).length;
                                renderCourts(); 
                                renderPlayers();
                            }
                        }
                    );
                } else {
                    delete activeMatches[lastCourtNum];
                    delete courtNames[lastCourtNum]; 
                    delete allowRandomFill[lastCourtNum];
                    delete emergencyMode[lastCourtNum];
                    courtCount = Object.keys(activeMatches).length;
                    renderCourts(); 
                    renderPlayers();
                }
            } 
        });
        document.getElementById('btnClearAll').addEventListener('click', () => { 
            const existingKeys = Object.keys(activeMatches).map(Number);
            activeMatches = {}; 
            waitingQueue = []; 
            allowRandomFill = {};
            emergencyMode = {};
            existingKeys.forEach(i => {
                 activeMatches[i] = [null, null, null, null];
                allowRandomFill[i] = true;
                emergencyMode[i] = false;
            });
            courtCount = existingKeys.length;
            renderCourts(); 
            renderPlayers();
         });

        renderPlayers();
        renderCourts();
    </script>
</body>
</html>
